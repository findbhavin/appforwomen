    <!-- React 18 (production) + bundled components — works on file:// and http:// (no Babel external .jsx fetch) -->

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="js/eraya-react-dashboard.js"></script>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script>
        (function () {
            function safeParseObject(rawValue) {
                if (!rawValue) return {};
                try {
                    const parsed = JSON.parse(rawValue);
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (_err) {
                    return {};
                }
            }

            function setWelcomeName(name) {
                const heading = document.querySelector('.welcome-text h1');
                if (!heading) return;
                const safeName = String(name || 'User');
                heading.innerHTML = 'Welcome<br>back, ' + safeName;
            }

            const localUser = safeParseObject(localStorage.getItem('erayaUser'));
            if (localUser.name) {
                setWelcomeName(localUser.name);
            }

            if (window.ErayaAuth) {
                window.ErayaAuth.renderAuthStatus('auth-status');
                window.ErayaAuth.getCurrentUser().then(function (user) {
                    if (user && user.name) {
                        setWelcomeName(user.name);
                        localStorage.setItem('erayaUser', JSON.stringify({
                            email: user.email,
                            name: user.name
                        }));
                    }
                }).catch(function () {
                    // Keep local fallback name only.
                });
            }
        })();
    </script>

    <script>
        (function () {
            function openDashboardSymptomTracker() {
                if (typeof window._symptomTrackerToggleImpl === 'function') {
                    window._symptomTrackerToggleImpl();
                    return;
                }
                if (typeof window.toggleSymptomTracker === 'function') {
                    window.toggleSymptomTracker();
                    return;
                }
                window.location.href = 'symptoms.html';
            }
            function bindAddSymptoms() {
                var btn = document.getElementById('dashboard-add-symptoms');
                if (!btn || btn.dataset.bound) return;
                btn.dataset.bound = '1';
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    openDashboardSymptomTracker();
                });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bindAddSymptoms);
            } else {
                bindAddSymptoms();
            }
        })();
    </script>
